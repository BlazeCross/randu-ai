# =============================================================================
# 燃渡AI - Docker Compose 编排文件
# =============================================================================
# 服务说明：
# - db：PostgreSQL 16 数据库
# - app：Next.js 应用
#
# 使用方式：
# 1. 创建 .env.production 文件配置环境变量（参考 .env.example）
# 2. 启动：docker compose --env-file .env.production up -d --build
# 3. 查看日志：docker compose logs -f app
# 4. 停止：docker compose down
# =============================================================================

services:
  # ---------- PostgreSQL 数据库 ----------
  db:
    image: postgres:16-alpine
    container_name: randu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-randu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在.env.production中设置POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-randu_ai}
      # 数据库时区设为上海
      TZ: Asia/Shanghai
    volumes:
      # 数据持久化：数据库文件存储在宿主机
      - postgres_data:/var/lib/postgresql/data
      # 备份目录：供备份脚本使用
      - ./backups:/backups
    ports:
      # 仅限本机访问，不对外暴露（安全）
      - "127.0.0.1:5432:5432"
    # 2核4G 内存配额：数据库限制 1G，留出余量给应用与系统
    mem_limit: 1g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-randu} -d ${POSTGRES_DB:-randu_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - randu-network

  # ---------- Next.js 应用 ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时注入的公开变量
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: randu-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接（指向 db 容器）
      # connection_limit 限制 Prisma 连接池大小，避免 2核4G 下超 PostgreSQL max_connections
      # pool_timeout 获取连接超时（秒），避免请求无限堆积
      DATABASE_URL: "postgresql://${POSTGRES_USER:-randu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-randu_ai}?connection_limit=5&pool_timeout=10&schema=public"
      # Coze API
      COZE_API_TOKEN: ${COZE_API_TOKEN:?请在.env.production中设置COZE_API_TOKEN}
      COZE_BASE_URL: ${COZE_BASE_URL:-https://api.coze.cn}
      # 阿里云 OSS
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?请在.env.production中设置OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?请在.env.production中设置OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-randu-ai}
      OSS_REGION: ${OSS_REGION:-oss-cn-chengdu}
      OSS_CDN_DOMAIN: ${OSS_CDN_DOMAIN:-}
      # JWT 密钥
      JWT_SECRET: ${JWT_SECRET:?请在.env.production中设置JWT_SECRET}
      # 火山方舟 AI 模型
      VOLC_ARK_API_KEY: ${VOLC_ARK_API_KEY:-}
      VOLC_MODEL_DOUBAO: ${VOLC_MODEL_DOUBAO:-}
      VOLC_MODEL_SEEDREAM: ${VOLC_MODEL_SEEDREAM:-}
      # 应用配置
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
    ports:
      # 对外暴露 3000 端口（后续可用 Nginx 反向代理）
      - "3000:3000"
    # 2核4G 内存配额：应用限制 2G，配合 db 的 1G 共 3G，留 1G 给系统
    mem_limit: 2g
    mem_reservation: 1g
    networks:
      - randu-network

# ---------- 数据卷 ----------
volumes:
  postgres_data:
    name: randu_postgres_data

# ---------- 网络 ----------
networks:
  randu-network:
    name: randu-network
    driver: bridge
