# =============================================================================
# 燃渡AI - Docker Compose 编排文件
# =============================================================================
# 服务说明：
# - db：PostgreSQL 16 数据库
# - app：Next.js 应用
#
# 使用方式：
# 1. 创建 .env.production 文件配置环境变量（参考 .env.example）
# 2. 启动：docker compose --env-file .env.production up -d --build
# 3. 查看日志：docker compose logs -f app
# 4. 停止：docker compose down
# =============================================================================

services:
  # ---------- PostgreSQL 数据库 ----------
  db:
    image: postgres:16-alpine
    container_name: randu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-randu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在.env.production中设置POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-randu_ai}
      # 数据库时区设为上海
      TZ: Asia/Shanghai
    volumes:
      # 数据持久化：数据库文件存储在宿主机
      - postgres_data:/var/lib/postgresql/data
      # 备份目录：供备份脚本使用
      - ./backups:/backups
    ports:
      # 仅限本机访问，不对外暴露（安全）
      - "127.0.0.1:5432:5432"
    # 2核4G 内存配额：数据库限制 1G，留出余量给应用与系统
    mem_limit: 1g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-randu} -d ${POSTGRES_DB:-randu_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - randu-network

  # ---------- Next.js 应用 ----------
  app:
    # 国内服务器 docker build 的 npm ci 经常卡死，改用 node:20-alpine 镜像 + volume mount 主机代码
    image: node:20-alpine
    container_name: randu-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # 数据库连接（指向 db 容器）
      DATABASE_URL: "postgresql://${POSTGRES_USER:-randu}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-randu_ai}?connection_limit=5&pool_timeout=10&schema=public"
      # Coze API
      COZE_API_TOKEN: ${COZE_API_TOKEN:?请在.env.production中设置COZE_API_TOKEN}
      COZE_BASE_URL: ${COZE_BASE_URL:-https://api.coze.cn}
      # 阿里云 OSS
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:?请在.env.production中设置OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:?请在.env.production中设置OSS_ACCESS_KEY_SECRET}
      OSS_BUCKET: ${OSS_BUCKET:-randu-ai}
      OSS_REGION: ${OSS_REGION:-oss-cn-chengdu}
      OSS_CDN_DOMAIN: ${OSS_CDN_DOMAIN:-}
      # JWT 密钥
      JWT_SECRET: ${JWT_SECRET:?请在.env.production中设置JWT_SECRET}
      # 火山方舟 AI 模型
      VOLC_ARK_API_KEY: ${VOLC_ARK_API_KEY:-}
      VOLC_MODEL_DOUBAO: ${VOLC_MODEL_DOUBAO:-}
      VOLC_MODEL_SEEDREAM: ${VOLC_MODEL_SEEDREAM:-}
      VOLC_MODEL_SEEDANCE: ${VOLC_MODEL_SEEDANCE:-}
      # 阿里云 STS（前端直传 OSS 临时凭证，可选）
      ALIYUN_STS_ACCESS_KEY_ID: ${ALIYUN_STS_ACCESS_KEY_ID:-}
      ALIYUN_STS_ACCESS_KEY_SECRET: ${ALIYUN_STS_ACCESS_KEY_SECRET:-}
      ALIYUN_STS_ROLE_ARN: ${ALIYUN_STS_ROLE_ARN:-}
      # 支付宝（可选，未配置则充值功能不可用）
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_APP_PRIVATE_KEY: ${ALIPAY_APP_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_GATEWAY: ${ALIPAY_GATEWAY:-https://openapi.alipay.com/gateway.do}
      ALIPAY_NOTIFY_URL: ${ALIPAY_NOTIFY_URL:-}
      ALIPAY_RETURN_URL: ${ALIPAY_RETURN_URL:-}
      # 应用配置
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
      # Prisma 引擎镜像（国内服务器无法访问 binaries.prisma.sh，使用镜像源）
      PRISMA_ENGINES_MIRROR: https://registry.npmmirror.com/-/binary/prisma
    volumes:
      # 挂载主机代码到容器（不重新构建镜像，避免 npm ci 卡死）
      - ./:/app
      # 排除主机 node_modules，使用容器内独立的 node_modules（避免权限/平台问题）
      - /app/node_modules
    working_dir: /app
    # 启动命令：安装 OpenSSL + 安装依赖 + 生成 Prisma Client + 构建 + 启动
    command: sh -c "apk add --no-cache openssl && npm config set registry https://registry.npmmirror.com && npm install --no-audit --no-fund && npx prisma generate && npm run build && npm start"
    ports:
      # 对外暴露 3000 端口（后续可用 Nginx 反向代理）
      - "3000:3000"
    # 2核4G 内存配额：应用限制 2G，配合 db 的 1G 共 3G，留 1G 给系统
    mem_limit: 2g
    mem_reservation: 1g
    networks:
      - randu-network

# ---------- 数据卷 ----------
volumes:
  postgres_data:
    name: randu_postgres_data

# ---------- 网络 ----------
networks:
  randu-network:
    name: randu-network
    driver: bridge
